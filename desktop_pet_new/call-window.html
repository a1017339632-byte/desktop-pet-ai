<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Incoming Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    #call-card {
      background: linear-gradient(135deg, #3c281e 0%, #4a3228 100%);
      border: 1.5px solid rgba(213, 114, 71, 0.6);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: call-slide-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes call-slide-in {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes call-ring {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-14deg); }
      30% { transform: rotate(10deg); }
      40% { transform: rotate(-10deg); }
      50% { transform: rotate(6deg); }
      60% { transform: rotate(-6deg); }
      70% { transform: rotate(0deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(213, 114, 71, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(213, 114, 71, 0); }
    }

    #call-icon {
      font-size: 32px;
      animation: call-ring 1.5s ease-in-out infinite;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    #call-label {
      font-size: 11px;
      color: rgba(240, 224, 208, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #call-caller {
      font-size: 16px;
      color: #f0e0d0;
      font-weight: 600;
      margin: 2px 0;
    }

    #call-countdown {
      font-size: 12px;
      color: rgba(240, 224, 208, 0.4);
      margin-bottom: 4px;
    }

    #call-actions {
      display: flex;
      gap: 24px;
      margin-top: 6px;
    }

    .call-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: pulse-glow 2s infinite;
    }
    .call-btn:hover { transform: scale(1.15); }
    .call-btn:active { transform: scale(0.9); }

    .call-btn.accept {
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
    }
    .call-btn.decline {
      background: linear-gradient(135deg, #e53935, #ef5350);
      box-shadow: 0 4px 12px rgba(229, 57, 53, 0.4);
      animation-delay: 1s;
    }
  </style>
</head>
<body>
  <div id="call-card">
    <div id="call-icon">📞</div>
    <div id="call-label">来电</div>
    <div id="call-caller">...</div>
    <div id="call-countdown">30s</div>
    <div id="call-actions">
      <button id="call-accept" class="call-btn accept" title="接听">✓</button>
      <button id="call-decline" class="call-btn decline" title="挂断">✕</button>
    </div>
  </div>

  <script>
    const callerEl = document.getElementById('call-caller');
    const countdownEl = document.getElementById('call-countdown');
    const acceptBtn = document.getElementById('call-accept');
    const declineBtn = document.getElementById('call-decline');

    let countdownValue = 30;
    let countdownTimer = null;
    let ringtone = null;

    // Get call info from main process
    window.electronAPI.getCallInfo().then((info) => {
      if (info && info.caller) {
        callerEl.textContent = info.caller;
      }
    });

    // Start countdown
    countdownTimer = setInterval(() => {
      countdownValue--;
      countdownEl.textContent = countdownValue + 's';
      if (countdownValue <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }, 1000);

    // Play ringtone
    try {
      ringtone = new Audio('assets/ringtone.mp3');
      ringtone.loop = true;
      ringtone.play().catch(() => {});
    } catch (e) {}

    // Button handlers
    acceptBtn.addEventListener('click', () => {
      stopRingtone();
      window.electronAPI.callResponse('accepted');
    });

    declineBtn.addEventListener('click', () => {
      stopRingtone();
      window.electronAPI.callResponse('declined');
    });

    function stopRingtone() {
      if (ringtone) {
        ringtone.pause();
        ringtone.currentTime = 0;
        ringtone = null;
      }
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }
  </script>
</body>
</html>
