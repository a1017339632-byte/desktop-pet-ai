<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Pet · Screen Supervisor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f14;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.06);
    --text: #e0ddd8;
    --text-dim: #888;
    --accent: #d07456;
    --accent2: #edc095;
    --green: #768a5e;
    --red: #c0524a;
    --blue: #5a7ab5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 20px;
    font-weight: 500;
    color: var(--accent2);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 2s infinite;
  }
  h1 .dot.online { background: var(--green); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }

  .card h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .current-app {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .current-title {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .badge.work { background: var(--blue); color: #fff; }
  .badge.social { background: #7a5aad; color: #fff; }
  .badge.video { background: #ad5a8a; color: #fff; }
  .badge.gaming { background: var(--green); color: #fff; }
  .badge.rival_ai { background: var(--red); color: #fff; }
  .badge.browsing { background: #5a8aad; color: #fff; }
  .badge.xiaohongshu { background: #d0566c; color: #fff; }
  .badge.other { background: #555; color: #ccc; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: var(--text-dim); }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .bar-container {
    margin: 6px 0;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .bar-label {
    width: 80px;
    text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width 0.5s;
  }
  .bar-time {
    width: 60px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 12px;
  }
  .history-time {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-size: 11px;
    width: 120px;
    flex-shrink: 0;
  }
  .history-app {
    color: var(--accent2);
    font-weight: 500;
    width: 120px;
    flex-shrink: 0;
  }
  .history-title {
    color: var(--text-dim);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-dur {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-size: 11px;
    width: 50px;
    text-align: right;
  }

  .reaction-item {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 12px;
  }
  .reaction-text { color: var(--accent2); }
  .reaction-time {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-size: 11px;
  }

  .meta {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>
  <span class="dot" id="status-dot"></span>
  Desktop Pet · Screen Supervisor
  <span style="flex:1"></span>
  <span id="clock" style="font-family:'JetBrains Mono';font-size:14px;color:var(--text-dim)"></span>
</h1>

<div class="grid">
  <!-- 当前状态 -->
  <div class="card">
    <h2>当前窗口</h2>
    <div class="current-app" id="cur-app">--</div>
    <div class="current-title" id="cur-title"></div>
    <span class="badge other" id="cur-badge">--</span>
    <div style="margin-top:12px">
      <div class="stat-row">
        <span class="stat-label">使用时长</span>
        <span class="stat-value" id="cur-dur">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">工作连续</span>
        <span class="stat-value" id="work-streak">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">空闲</span>
        <span class="stat-value" id="idle-time">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">竞品AI累计</span>
        <span class="stat-value" id="rival-total" style="color:var(--red)">--</span>
      </div>
    </div>
  </div>

  <!-- 分类时长 -->
  <div class="card">
    <h2>分类统计</h2>
    <div id="cat-bars" class="bar-container"></div>
  </div>
</div>

<div class="grid">
  <!-- 切换历史 -->
  <div class="card">
    <h2>窗口切换历史</h2>
    <div id="history-list"></div>
  </div>

  <!-- 小狗反应 -->
  <div class="card">
    <h2>小狗反应记录</h2>
    <div id="reactions-list"></div>
  </div>
</div>

<div class="meta">Auto-refresh every 3s · Data from relay server</div>

<script>
const CAT_COLORS = {
  work: '#5a7ab5', social: '#7a5aad', video: '#ad5a8a',
  gaming: '#768a5e', rival_ai: '#c0524a', browsing: '#5a8aad',
  xiaohongshu: '#d0566c', other: '#555',
};
const CAT_NAMES = {
  work: '工作', social: '社交', video: '视频',
  gaming: '游戏', rival_ai: '竞品AI', browsing: '浏览',
  xiaohongshu: '小红书', other: '其他',
};

function fmt(sec) {
  if (!sec || sec < 0) return '--';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function fmtTime(ts) {
  if (!ts) return '--';
  const d = new Date(ts * 1000);
  const h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${m}${ampm}`;
}

function fmtRange(start, dur) {
  const end = start + dur;
  return `${fmtTime(start)} - ${fmtTime(end)}`;
}

async function refresh() {
  try {
    const [supRes, petRes] = await Promise.all([
      fetch('/api/supervisor'),
      fetch('/api/pet'),
    ]);
    const sup = await supRes.json();
    const pet = await petRes.json();

    // Status dot
    const dot = document.getElementById('status-dot');
    dot.className = pet.online ? 'dot online' : 'dot';

    // Clock
    document.getElementById('clock').textContent = sup.time_bj || '';

    // Current window
    document.getElementById('cur-app').textContent = sup.current_app || '--';
    document.getElementById('cur-title').textContent = sup.current_title || '';
    const badge = document.getElementById('cur-badge');
    const cat = sup.current_category || 'other';
    badge.textContent = CAT_NAMES[cat] || cat;
    badge.className = `badge ${cat}`;

    document.getElementById('cur-dur').textContent = fmt(sup.duration_seconds);
    document.getElementById('work-streak').textContent =
      sup.work_streak_minutes > 0 ? `${sup.work_streak_minutes}m` : '--';
    document.getElementById('idle-time').textContent = fmt(sup.idle_seconds);
    document.getElementById('rival-total').textContent = fmt(sup.rival_ai_total_today);

    // Category bars
    const catTime = sup.category_time || {};
    const maxCat = Math.max(...Object.values(catTime), 1);
    const catBars = document.getElementById('cat-bars');
    catBars.innerHTML = Object.entries(catTime)
      .sort((a, b) => b[1] - a[1])
      .map(([c, s]) => `
        <div class="bar-row">
          <span class="bar-label">${CAT_NAMES[c] || c}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(s/maxCat*100).toFixed(1)}%;background:${CAT_COLORS[c]||'#555'}"></div>
          </div>
          <span class="bar-time">${fmt(s)}</span>
        </div>
      `).join('');

    // History
    const hist = (sup.recent_history || []).slice().reverse();
    document.getElementById('history-list').innerHTML = hist.map(h => `
      <div class="history-item">
        <span class="history-time">${fmtRange(h.start, h.duration)}</span>
        <span class="history-app">${h.app || '--'}</span>
        <span class="badge ${h.category}" style="font-size:10px;padding:1px 6px">${CAT_NAMES[h.category]||h.category}</span>
        <span class="history-title">${h.title || ''}</span>
        <span class="history-dur">${fmt(h.duration)}</span>
      </div>
    `).join('') || '<div style="color:var(--text-dim);font-size:12px">暂无记录</div>';

    // Reactions
    const reacts = (sup.recent_reactions || []).slice().reverse();
    document.getElementById('reactions-list').innerHTML = reacts.map(r => `
      <div class="reaction-item">
        <span class="reaction-time">${fmtTime(r.time)}</span>
        <span class="reaction-text"> ${r.text || ''}</span>
        <span class="badge ${r.emotion === 'angry' ? 'rival_ai' : r.emotion === 'happy' ? 'gaming' : 'other'}" style="font-size:10px;padding:1px 6px;margin-left:4px">${r.emotion || ''}</span>
      </div>
    `).join('') || '<div style="color:var(--text-dim);font-size:12px">小狗很乖，还没闹</div>';

  } catch (e) {
    console.error('refresh failed:', e);
  }
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
